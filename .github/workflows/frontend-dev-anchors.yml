name: Frontend dev anchors

on:
  pull_request:
    paths:
      - 'frontend/**'
      - 'backend/application/domain/**'
      - '.github/workflows/frontend-dev-anchors.yml'

jobs:
  anchors:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run ci:anchors
